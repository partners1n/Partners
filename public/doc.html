<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset='UTF-8'/>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover'/>
    <meta name='apple-mobile-web-app-capable' content='yes'/>
    <meta name='apple-mobile-web-app-status-bar-style' content='black-translucent'/>
    <title>เลขาผู้ช่วยส่วนตัว</title>
    <link href='https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600&display=swap' rel='stylesheet'/>
    <link href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css' rel='stylesheet'/>
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #6366f1, #8b5cf6);
            --secondary-gradient: linear-gradient(135deg, #f472b6, #db2777);
            --bg-color: #ffffff;
            --chat-bg: #f8fafc;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --bot-message-bg: #f1f5f9;
            --user-message-bg: #818cf8;
            --border-color: #e2e8f0;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 6px rgba(0,0,0,0.1);
            --shadow-lg: 0 10px 15px rgba(0,0,0,0.1);
            --safe-area-inset-top: env(safe-area-inset-top, 0px);
            --safe-area-inset-bottom: env(safe-area-inset-bottom, 0px);
            --safe-area-inset-left: env(safe-area-inset-left, 0px);
            --safe-area-inset-right: env(safe-area-inset-right, 0px);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Sarabun', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: var(--bg-color);
            color: var(--text-primary);
            -webkit-overflow-scrolling: touch;
        }

        .container {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            position: fixed;
            top: var(--safe-area-inset-top);
            left: var(--safe-area-inset-left);
            right: var(--safe-area-inset-right);
            bottom: var(--safe-area-inset-bottom);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            background-color: var(--bg-color);
            border-bottom: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
            flex-shrink: 0;
            width: 100%;
            z-index: 10;
            padding-top: calc(1rem + var(--safe-area-inset-top));
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .header-title h1 {
            font-size: 1.5rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 200px;
        }

        .bot-status {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .status-indicator {
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            animation: pulse 2s infinite;
            -webkit-animation: pulse 2s infinite;
            animation-play-state: running !important;
            -webkit-animation-play-state: running !important;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }

        .controls {
            display: flex;
            gap: 1rem;
        }

        .clear-chat-button {
            background: var(--primary-gradient);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            white-space: nowrap;
        }

        .clear-chat-button:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            background-color: var(--chat-bg);
            scroll-behavior: smooth;
            display: flex;
            flex-direction: column;
            width: 100%;
            -webkit-overflow-scrolling: touch;
        }

        .message {
            display: flex;
            align-items: flex-start;
            margin-bottom: 1rem;
            opacity: 0;
            transform: translateY(20px);
            animation: messageAppear 0.5s ease forwards;
            -webkit-animation: messageAppear 0.5s ease forwards;
        }

        @keyframes messageAppear {
            to { opacity: 1; transform: translateY(0); }
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            margin-right: 1rem;
            background: var(--primary-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            box-shadow: var(--shadow-md);
            flex-shrink: 0;
            overflow: hidden;
            position: relative;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
        }

        .user-message .avatar {
            background: var(--secondary-gradient);
        }

        .message-bubble {
            max-width: 80%;
            padding: 1rem 1.5rem;
            border-radius: 1rem;
            box-shadow: var(--shadow-sm);
            line-height: 1.5;
            position: relative;
            white-space: pre-wrap;
            word-break: break-word;
            overflow-wrap: break-word;
        }

        .message-bubble img {
            max-width: 100%;
            height: auto;
            border-radius: 0.5rem;
        }

        .bot-message .message-bubble {
            background-color: var(--bot-message-bg);
            border-top-left-radius: 0;
        }

        .user-message {
            flex-direction: row-reverse;
        }

        .user-message .avatar {
            margin-right: 0;
            margin-left: 1rem;
        }

        .user-message .message-bubble {
            background-color: var(--user-message-bg);
            color: white;
            border-top-right-radius: 0;
        }

        .input-container {
            display: flex;
            gap: 0.5rem;
            padding: 1rem;
            background-color: var(--bg-color);
            border-top: 1px solid var(--border-color);
            box-shadow: var(--shadow-md);
            flex-shrink: 0;
            width: 100%;
            padding-bottom: calc(1rem + var(--safe-area-inset-bottom));
            z-index: 10;
        }

        .action-buttons {
            display: flex;
            gap: 0.5rem;
            flex-shrink: 0;
        }

        .action-button {
            width: 40px;
            height: 40px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .action-button:hover {
            background-color: var(--border-color);
            color: var(--text-primary);
        }

        .message-input {
            flex: 1;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 0.75rem;
            background-color: var(--bg-color);
            color: var(--text-primary);
            resize: none;
            font-size: 1rem;
            min-height: 40px;
            max-height: 120px;
            outline: none;
            transition: border-color 0.3s ease;
        }

        .message-input:focus {
            border-color: #818cf8;
        }

        .send-button {
            width: 40px;
            height: 40px;
            border: none;
            background: var(--primary-gradient);
            color: white;
            border-radius: 0.75rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .send-button:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--bg-color);
            border-radius: 1rem;
            box-shadow: var(--shadow-lg);
            max-width: 90%;
            max-height: 90%;
            overflow-y: auto;
            padding: 2rem;
            position: relative;
            animation: modalSlideIn 0.3s ease;
            -webkit-animation: modalSlideIn 0.3s ease;
            width: 500px;
        }

        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .modal-header h2 {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .close-modal {
            background: none;
            border: none;
            font-size: 1.5rem;
            color: var(--text-secondary);
            cursor: pointer;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 0.5rem;
            transition: all 0.3s ease;
        }

        .close-modal:hover {
            background-color: var(--border-color);
            color: var(--text-primary);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text-primary);
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            font-size: 1rem;
            background-color: var(--bg-color);
            color: var(--text-primary);
            transition: border-color 0.3s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #818cf8;
        }

        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }

        .modal-button {
            background: var(--primary-gradient);
            color: white;
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 500;
            font-size: 1rem;
            transition: all 0.3s ease;
            width: 100%;
        }

        .modal-button:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .doc-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }

        .doc-item {
            background: var(--bg-color);
            border: 2px solid var(--border-color);
            border-radius: 1rem;
            padding: 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }

        .doc-item:hover {
            border-color: #818cf8;
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .doc-item i {
            font-size: 2rem;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .doc-item-title {
            font-weight: 600;
            color: var(--text-primary);
            font-size: 0.9rem;
        }

        .doc-item-desc {
            font-size: 0.75rem;
            color: var(--text-secondary);
            line-height: 1.4;
        }

        @media (max-width: 768px) {
            .header-title h1 {
                font-size: 1.25rem;
                max-width: 150px;
            }

            .modal {
                max-width: 95%;
                padding: 1.5rem;
            }

            .doc-grid {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            }
        }

        .loading-dots {
            display: inline-flex;
            gap: 4px;
        }

        .loading-dots span {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: var(--text-secondary);
            animation: loadingDot 1.4s infinite ease-in-out;
            -webkit-animation: loadingDot 1.4s infinite ease-in-out;
        }

        .loading-dots span:nth-child(1) {
            animation-delay: -0.32s;
            -webkit-animation-delay: -0.32s;
        }

        .loading-dots span:nth-child(2) {
            animation-delay: -0.16s;
            -webkit-animation-delay: -0.16s;
        }

        @keyframes loadingDot {
            0%, 80%, 100% {
                transform: scale(0);
            }
            40% {
                transform: scale(1);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-title">
                <h1>🤖 AI Assistant</h1>
                <div class="bot-status">
                    <div class="status-indicator"></div>
                    <span>ออนไลน์</span>
                </div>
            </div>
            <div class="controls">
                <button class="clear-chat-button" id="clearChat">
                    <i class="fas fa-trash-alt"></i>
                    <span>ล้างแชท</span>
                </button>
            </div>
        </div>

        <div class="chat-container" id="chatContainer"></div>

        <div class="input-container">
            <div class="action-buttons">
                <button class="action-button" id="infoButton" title="ข้อมูลส่วนตัว">
                    <i class="fas fa-user"></i>
                </button>
                <button class="action-button" id="contactButton" title="ข้อมูลผู้ติดต่อ">
                    <i class="fas fa-address-book"></i>
                </button>
                <button class="action-button" id="documentButton" title="สร้างเอกสาร">
                    <i class="fas fa-file-alt"></i>
                </button>
                <button class="action-button" id="generateDocButton" title="สร้างภาพ">
                    <i class="fas fa-image"></i>
                </button>
                <button class="action-button" id="attachButton" title="แนบรูปภาพ">
                    <i class="fas fa-paperclip"></i>
                </button>
                <button class="action-button" id="micButton" title="พิมพ์ด้วยเสียง">
                    <i class="fas fa-microphone"></i>
                </button>
                <button class="action-button" id="copyButton" title="คัดลอกข้อความ">
                    <i class="fas fa-copy"></i>
                </button>
                <button class="action-button" id="pasteButton" title="วางข้อความ">
                    <i class="fas fa-paste"></i>
                </button>
            </div>
            <textarea class="message-input" id="messageInput" placeholder="พิมพ์ข้อความ..." rows="1"></textarea>
            <button class="send-button" id="sendButton">
                <i class="fas fa-paper-plane"></i>
            </button>
            <input type="file" id="fileInput" accept="image/*" style="display: none;">
        </div>
    </div>

    <!-- Modal สำหรับข้อมูลส่วนตัว -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="infoModal">
            <div class="modal-header">
                <h2>ข้อมูลส่วนตัว</h2>
                <button class="close-modal" id="closeInfoModal">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <form id="infoForm">
                <div class="form-group">
                    <label for="fullName">ชื่อ-นามสกุล:</label>
                    <input type="text" id="fullName" name="fullName" required>
                </div>
                <div class="form-group">
                    <label for="idCard">เลขบัตรประชาชน:</label>
                    <input type="text" id="idCard" name="idCard" maxlength="13" required>
                </div>
                <div class="form-group">
                    <label for="address">ที่อยู่:</label>
                    <textarea id="address" name="address" required></textarea>
                </div>
                <div class="form-group">
                    <label for="phone">เบอร์โทร:</label>
                    <input type="tel" id="phone" name="phone" required>
                </div>
                <div class="form-group">
                    <label for="email">อีเมล:</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <button type="submit" class="modal-button">บันทึก</button>
            </form>
        </div>

        <!-- Modal สำหรับข้อมูลผู้ติดต่อ -->
        <div class="modal" id="contactModal" style="display: none;">
            <div class="modal-header">
                <h2>ข้อมูลผู้ติดต่อ</h2>
                <button class="close-modal" id="closeContactModal">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <form id="contactForm">
                <div class="form-group">
                    <label for="contactName">ชื่อผู้ติดต่อ:</label>
                    <input type="text" id="contactName" name="contactName" required>
                </div>
                <div class="form-group">
                    <label for="contactPhone">เบอร์โทร:</label>
                    <input type="tel" id="contactPhone" name="contactPhone" required>
                </div>
                <div class="form-group">
                    <label for="contactEmail">อีเมล:</label>
                    <input type="email" id="contactEmail" name="contactEmail">
                </div>
                <div class="form-group">
                    <label for="contactRelation">ความสัมพันธ์:</label>
                    <input type="text" id="contactRelation" name="contactRelation">
                </div>
                <button type="submit" class="modal-button">บันทึก</button>
            </form>
        </div>

        <!-- Modal สำหรับเลือกประเภทเอกสาร -->
        <div class="modal" id="documentModal" style="display: none;">
            <div class="modal-header">
                <h2>เลือกประเภทเอกสาร</h2>
                <button class="close-modal" id="closeDocumentModal">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="doc-grid" id="docGrid">
                <!-- จะถูกเติมด้วย JavaScript -->
            </div>
        </div>

        <!-- Modal สำหรับฟอร์มสร้างสัญญา -->
        <div class="modal" id="contractFormModal" style="display: none;">
            <div class="modal-header">
                <button class="close-modal" id="backContractFormModal" style="margin-right: auto;">
                    <i class="fas fa-arrow-left"></i>
                </button>
                <h2 id="contractFormTitle">สัญญา</h2>
                <button class="close-modal" id="closeContractFormModal" style="visibility: hidden;">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <form id="contractForm">
                <div id="contractFormFields">
                    <!-- ฟิลด์จะถูกเติมด้วย JavaScript -->
                </div>
                <button type="submit" class="modal-button">สร้างเอกสาร</button>
            </form>
        </div>

        <!-- Modal สำหรับสร้างภาพ -->
        <div class="modal" id="docModal" style="display: none;">
            <div class="modal-header">
                <h2>สร้างภาพด้วย AI</h2>
                <button class="close-modal" id="closeDocModal">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="form-group">
                <label for="imagePrompt">คำอธิบายภาพที่ต้องการ:</label>
                <textarea id="imagePrompt" placeholder="เช่น: แมวสีขาวนั่งบนโต๊ะ มีแสงอาทิตย์ส่องเข้ามา" rows="4"></textarea>
            </div>
            <button class="modal-button" id="generateImageButton">
                <i class="fas fa-magic"></i> สร้างภาพ
            </button>
        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
<script>
    // ข้อมูลสัญญาทั้งหมด - Embedded ไว้ในโค้ดแล้ว
    const CONTRACTS_DATA = {
        'sale': {
            title: 'สัญญาซื้อขาย',
            desc: 'สัญญาสำหรับการซื้อขายสินค้าหรือทรัพย์สิน ระบุรายละเอียดสินค้า ราคา และเงื่อนไขการชำระเงิน',
            icon: 'fa-handshake',
            fields: [
                { id: 'product_name', label: 'ชื่อสินค้า/ทรัพย์สิน:', type: 'text', required: true },
                { id: 'sale_price', label: 'ราคาขาย:', type: 'number', required: true },
                { id: 'payment_terms', label: 'เงื่อนไขการชำระเงิน:', type: 'textarea', required: true },
                { id: 'delivery_terms', label: 'เงื่อนไขการส่งมอบ:', type: 'textarea', required: false }
            ]
        },
        'lease': {
            title: 'สัญญาเช่า',
            desc: 'สัญญาสำหรับการเช่าอสังหาริมทรัพย์ ระบุค่าเช่า ระยะเวลา และเงื่อนไขต่างๆ',
            icon: 'fa-home',
            fields: [
                { id: 'property_address', label: 'ที่อยู่ทรัพย์สิน:', type: 'textarea', required: true },
                { id: 'rental_amount', label: 'ค่าเช่าต่อเดือน:', type: 'number', required: true },
                { id: 'lease_period', label: 'ระยะเวลาเช่า:', type: 'text', required: true },
                { id: 'deposit_amount', label: 'เงินประกัน:', type: 'number', required: false },
                { id: 'additional_terms', label: 'เงื่อนไขเพิ่มเติม:', type: 'textarea', required: false }
            ]
        },
        'employment': {
            title: 'สัญญาจ้างงาน',
            desc: 'สัญญาสำหรับการจ้างพนักงาน ระบุตำแหน่ง เงินเดือน และสวัสดิการ',

    // สร้าง HTML สำหรับ document grid
    function renderDocumentGrid() {
        docGrid.innerHTML = '';
        
        for (const [key, contract] of Object.entries(CONTRACTS_DATA)) {
            const docItem = document.createElement('div');
            docItem.className = 'doc-item';
            docItem.setAttribute('data-contract', key);
            
            const icon = contract.icon || 'fa-file-contract';
            
            docItem.innerHTML = `
                <i class="fas ${icon}"></i>
                <div class="doc-item-title">${contract.title}</div>
                <div class="doc-item-desc">${contract.desc}</div>
            `;
            
            docGrid.appendChild(docItem);
        }
        
        // เพิ่ม event listeners
        attachDocumentItemListeners();
    }

    // สร้างฟอร์มจากข้อมูล fields
    function generateFormHTML(fields) {
        let formHTML = '';
        
        for (const field of fields) {
            const required = field.required ? 'required' : '';
            const step = field.step ? `step="${field.step}"` : '';
            
            formHTML += `<div class="form-group">`;
            formHTML += `<label for="${field.id}">${field.label}</label>`;
            
            if (field.type === 'textarea') {
                formHTML += `<textarea id="${field.id}" name="${field.id}" ${required}></textarea>`;
            } else {
                formHTML += `<input type="${field.type}" id="${field.id}" name="${field.id}" ${step} ${required}>`;
            }
            
            formHTML += `</div>`;
        }
        
        return formHTML;
    }

    // เพิ่ม event listeners สำหรับ document items
    function attachDocumentItemListeners() {
        const docItems = document.querySelectorAll('.doc-item');
        
        docItems.forEach(item => {
            item.addEventListener('click', function() {
                const contractType = this.getAttribute('data-contract');
                const contract = CONTRACTS_DATA[contractType];
                
                if (contract) {
                    contractFormTitle.textContent = contract.title;
                    contractFormFields.innerHTML = generateFormHTML(contract.fields);
                    closeDocumentModalFunc();
                    openContractFormModal();
                }
            });
        });
    }

    function addMessage(text, isUser = false) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${isUser ? 'user-message' : 'bot-message'}`;
        
        const avatarDiv = document.createElement('div');
        avatarDiv.className = 'avatar';
        avatarDiv.innerHTML = isUser ? 
            (userInfo.fullName ? userInfo.fullName.charAt(0).toUpperCase() : 'U') : 
            '🤖';
        
        const bubbleDiv = document.createElement('div');
        bubbleDiv.className = 'message-bubble';
        bubbleDiv.innerHTML = text;
        
        messageDiv.appendChild(avatarDiv);
        messageDiv.appendChild(bubbleDiv);
        chatContainer.appendChild(messageDiv);
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function addTypingIndicator() {

        messageDiv.id = 'typingIndicator';

        const bubbleDiv = document.createElement('div');
        bubbleDiv.className = 'message-bubble';

        messageDiv.appendChild(avatarDiv);
        messageDiv.appendChild(bubbleDiv);
        chatContainer.appendChild(messageDiv);
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function removeTypingIndicator() {

    async function getBotResponse(message) {
        const apiUrl = 'https://api.anthropic.com/v1/messages';
        const apiKey = 'sk-ant-api03-BN1Rco7jMJU6p-V1LV_rBvNaODUJnhqBw4xWMzfTJNLMg3JqPQiQJdJGwvyWu_JCfX4u1RfCY5jYYKzePDNcZQ-31vxFQAA';

        let systemPrompt = 'คุณคือผู้ช่วยส่วนตัวที่ชาญฉลาดและเป็นมิตร ตอบคำถามด้วยภาษาไทยที่สุภาพและชัดเจน';
        
        if (userInfo.fullName) {
            systemPrompt += `\n\nข้อมูลผู้ใช้:\nชื่อ: ${userInfo.fullName}\nบัตรประชาชน: ${userInfo.idCard}\nที่อยู่: ${userInfo.address}\nเบอร์โทร: ${userInfo.phone}\nอีเมล: ${userInfo.email}`;
        }
        
        if (contactInfo.contactName) {
            systemPrompt += `\n\nข้อมูลผู้ติดต่อ:\nชื่อ: ${contactInfo.contactName}\nเบอร์โทร: ${contactInfo.contactPhone}\nอีเมล: ${contactInfo.contactEmail}\nความสัมพันธ์: ${contactInfo.contactRelation}`;
        }

        try {
            const response = await fetch(apiUrl, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'x-api-key': apiKey,
                    'anthropic-version': '2023-06-01'
                },
                body: JSON.stringify({
                    model: 'claude-3-5-sonnet-20241022',
                    max_tokens: 8096,
                    system: systemPrompt,
                    messages: [{
                        role: 'user',
                        content: message
                    }]
                })
            });

            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }

            const data = await response.json();
            return data.content[0].text;
        } catch (error) {
            console.error('Error:', error);
            return 'ขอโทษครับ เกิดข้อผิดพลาดในการเชื่อมต่อกับระบบ กรุณาลองใหม่อีกครั้ง';
        }
    }

        const message = messageInput.value.trim();

        addMessage(message, true);
        messageInput.value = '';
        messageInput.style.height = 'auto';

        addTypingIndicator();
        const response = await getBotResponse(message);
        removeTypingIndicator();
        addMessage(response);
    }

    async function handleGenerateImage() {
        const prompt = imagePrompt.value.trim();
        if (!prompt) {
            alert('กรุณาระบุคำอธิบายภาพที่ต้องการ');
            return;
        }

        closeDocModalFunc();
        addMessage(`กำลังสร้างภาพ: ${prompt}`, true);
        addTypingIndicator();

        try {
            const response = await fetch('https://image.pollinations.ai/prompt/' + encodeURIComponent(prompt));
            const imageUrl = response.url;
            
            removeTypingIndicator();
            addMessage(`<img src="${imageUrl}" alt="${prompt}" style="max-width: 100%; border-radius: 0.5rem;">`);
            imagePrompt.value = '';
        } catch (error) {
            removeTypingIndicator();
            addMessage('ขอโทษครับ ไม่สามารถสร้างภาพได้ในขณะนี้ กรุณาลองใหม่อีกครั้ง');
        }
    }

    async function handleCopyText() {
        try {
            const text = await navigator.clipboard.readText();
            messageInput.value = text;
            addMessage('คัดลอกข้อความเรียบร้อยแล้ว');
        } catch (err) {
            alert('ไม่สามารถคัดลอกข้อความได้ กรุณาอนุญาตการเข้าถึงคลิปบอร์ด');
        }
    }

    async function handlePasteText() {
        try {
            const text = await navigator.clipboard.readText();
            messageInput.value += text;
        } catch (err) {
            alert('ไม่สามารถวางข้อความได้ กรุณาอนุญาตการเข้าถึงคลิปบอร์ด');
        }
    }

    async function performOCR(imageUrl) {
        addTypingIndicator();
        try {
            const { data: { text } } = await Tesseract.recognize(imageUrl, 'tha+eng');
            removeTypingIndicator();
            if (text.trim()) {
                addMessage(`ข้อความที่พบในรูปภาพ:\n\n${text}`);
            } else {
                addMessage('ไม่พบข้อความในรูปภาพ');
            }
        } catch (error) {
            removeTypingIndicator();
            addMessage('ขอโทษครับ ไม่สามารถอ่านข้อความจากรูปภาพได้');
        }
    }

    contractForm.addEventListener('submit', function(e) {
        e.preventDefault();
        if (isSubmitting) return;
        isSubmitting = true;

        const contractTitle = contractFormTitle.textContent;
        const inputs = contractFormFields.querySelectorAll('input, textarea');
        let formData = `สร้าง${contractTitle}:\n`;
        
        inputs.forEach(input => {
            const label = input.previousElementSibling ? input.previousElementSibling.textContent : '';
            const value = input.value || '........';
            formData += `${label} ${value}\n`;
        });

        messageInput.value = formData;
        closeModal(contractFormModal);
        handleSendMessage();

        setTimeout(() => { isSubmitting = false; }, 1000);
    });

            addMessage(message, true);

    micButton.addEventListener('click', () => {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            alert('เบราว์เซอร์ของคุณไม่รองรับการพิมพ์ด้วยเสียง หรือคุณกำลังใช้ iOS ซึ่งอาจมีข้อจำกัด');
            return;
        }

        const recognition = new SpeechRecognition();
        recognition.lang = 'th-TH';
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;

        recognition.start();
        micButton.style.color = '#ff0000';

        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            messageInput.value = transcript;
            micButton.style.color = 'var(--text-secondary)';
            handleSendMessage();
        };

        recognition.onerror = (event) => {
            console.error('Speech recognition error:', event.error);
            alert('เกิดข้อผิดพลาดในการพิมพ์ด้วยเสียง: ' + event.error);
            micButton.style.color = 'var(--text-secondary)';
        };

        recognition.onend = () => {
            micButton.style.color = 'var(--text-secondary)';
        };
    });
