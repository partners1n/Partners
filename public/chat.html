<!DOCTYPE html>
<html lang="th" data-theme="dark">
<head>
    <meta charset="UTF-8"/>
    <title>Neon AI | เลขาแชท</title> 
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"/>
    <meta name="theme-color" content="#0a0a0f"> 
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet"/>
    <script src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js' defer='defer'></script>

  <style>
/* --- NEON DARK THEME VARIABLES --- */
:root {
    --bg-main: #0a0a0f; 
    --bg-secondary: #14141f; 
    --chat-bg: #0f0f1a; 
    
    --text-primary: #e0e0ff; 
    --text-secondary: #8a8ab5; 
    
    /* Neon Colors */
    --neon-cyan: #00f3ff;
    --neon-purple: #bd00ff;
    --neon-blue: #3b82f6;
    
    /* Neon Glow Shadows */
    --glow-cyan: 0 0 15px rgba(0, 243, 255, 0.4), 0 0 5px rgba(0, 243, 255, 0.6);
    --glow-purple: 0 0 15px rgba(189, 0, 255, 0.4), 0 0 5px rgba(189, 0, 255, 0.6);
    --glow-input: 0 0 20px rgba(0, 243, 255, 0.15);
    
    --glass-dark: rgba(20, 20, 31, 0.85); 
    --border-neon: 1px solid rgba(0, 243, 255, 0.15);
    
    --bot-msg-bg: #1a1a2e;
    --user-msg-bg: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));

    --header-height: 60px;
}

* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Sarabun', sans-serif; -webkit-tap-highlight-color: transparent; outline: none; }
h1, .partner-btn-item, .grid-item, .popup-title-partners, .toast { font-family: 'Rajdhani', sans-serif; letter-spacing: 0.5px; }

html, body { 
    height: 100dvh; overflow: hidden; 
    background-color: var(--bg-main); color: var(--text-primary);
    background-image: 
        linear-gradient(rgba(0, 243, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 243, 255, 0.03) 1px, transparent 1px);
    background-size: 30px 30px;
}

#assistant-container {
    width: 100%; height: 100dvh; display: flex; flex-direction: column; position: relative;
}

/* --- HEADER --- */
.header {
    height: var(--header-height);
    display: flex; justify-content: space-between; align-items: center; padding: 0 16px;
    background: var(--glass-dark); 
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border-bottom: var(--border-neon);
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    z-index: 100;
}
.header-title h1 { 
    font-size: 1.2rem; font-weight: 700; 
    background: linear-gradient(to right, var(--neon-cyan), var(--neon-purple));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    text-shadow: 0 0 10px rgba(0, 243, 255, 0.3);
}
.header-controls { display: flex; gap: 8px; }
.icon-btn {
    background: rgba(255,255,255,0.05); border: var(--border-neon); 
    width: 38px; height: 38px; border-radius: 10px;
    color: var(--neon-cyan); cursor: pointer; font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.3s ease;
}
.icon-btn:hover { background: var(--neon-cyan); color: var(--bg-main); box-shadow: var(--glow-cyan); }
.theme-toggle { display: none; } /* Force Dark Mode */

/* --- CHAT AREA --- */
.chat-container {
    flex: 1; overflow-y: auto; padding: 16px; 
    display: flex; flex-direction: column; gap: 14px;
    padding-bottom: 20px;
    scrollbar-width: thin; scrollbar-color: var(--neon-cyan) var(--bg-main);
}
.chat-container::-webkit-scrollbar { width: 6px; }
.chat-container::-webkit-scrollbar-thumb { background: var(--neon-cyan); border-radius: 10px; }

/* Messages */
.message { display: flex; max-width: 85%; animation: messageSlideIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
@keyframes messageSlideIn {
    from { opacity: 0; transform: translateY(20px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
}

.avatar {
    width: 32px; height: 32px; border-radius: 8px; background: rgba(255,255,255,0.1);
    display: flex; align-items: center; justify-content: center; margin: 0 8px; flex-shrink: 0;
    font-size: 0.8rem; border: 1px solid rgba(255,255,255,0.1);
}
.bot-message .avatar { color: var(--neon-cyan); box-shadow: 0 0 10px rgba(0, 243, 255, 0.2); }
.user-message .avatar { display: none; } 

.message-bubble {
    padding: 10px 16px; border-radius: 16px; line-height: 1.5; font-size: 0.95rem;
    word-wrap: break-word; position: relative; overflow: hidden;
    border: 1px solid transparent; transition: all 0.3s;
}

/* Bot Message Style */
.bot-message { align-self: flex-start; margin-right: auto; }
.bot-message .message-bubble { 
    background: var(--bot-msg-bg); color: var(--text-primary); 
    border-bottom-left-radius: 4px; 
    border-color: rgba(255,255,255,0.08);
}
.bot-message .message-bubble::after {
    content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
    background: linear-gradient(to right, transparent, rgba(255,255,255,0.03), transparent);
    transform: rotate(30deg); animation: shimmer 4s infinite; pointer-events: none;
}
@keyframes shimmer { from { transform: translateX(-100%) rotate(30deg); } to { transform: translateX(100%) rotate(30deg); } }

/* User Message Style */
.user-message { align-self: flex-end; flex-direction: row-reverse; margin-left: auto; }
.user-message .message-bubble { 
    background: var(--user-msg-bg); color: #fff; font-weight: 500;
    border-bottom-right-radius: 4px; 
    box-shadow: 0 4px 15px rgba(189, 0, 255, 0.3); border: none;
}

/* Typing Indicator (Managed by JS now) */
.typing-indicator { 
    display: none; align-self: flex-start; margin-left: 10px; margin-bottom: 10px;
    padding: 8px 12px; background: rgba(255,255,255,0.05); border-radius: 20px;
    font-size: 0.8rem; color: var(--neon-cyan); border: 1px solid rgba(0, 243, 255, 0.2);
}
.typing-indicator.visible { display: flex; align-items: center; gap: 5px; animation: messageSlideIn 0.3s ease; }
.typing-dot { width: 6px; height: 6px; background: var(--neon-cyan); border-radius: 50%; animation: typingBounce 1s infinite; }
.typing-dot:nth-child(2) { animation-delay: 0.2s; } .typing-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes typingBounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }


/* --- INPUT SECTION --- */
.input-section {
    padding: 12px 12px calc(12px + env(safe-area-inset-bottom));
    background: transparent; pointer-events: none; z-index: 50;
}
.input-section > * { pointer-events: auto; }

.input-wrapper {
    display: flex; gap: 8px; align-items: center;
    background: var(--glass-dark); 
    border: var(--border-neon);
    border-radius: 20px; padding: 6px 8px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    transition: all 0.3s ease;
}
.input-wrapper:focus-within {
    border-color: var(--neon-cyan);
    box-shadow: var(--glow-input);
    transform: translateY(-2px);
}

.message-input {
    flex: 1; padding: 10px; border: none; background: transparent; 
    color: var(--text-primary); font-size: 1rem; font-weight: 500; min-width: 0;
}
.message-input::placeholder { color: var(--text-secondary); opacity: 0.7; }

.action-btn {
    background: transparent; border: none; width: 40px; height: 40px; 
    display: flex; align-items: center; justify-content: center;
    color: var(--text-secondary); cursor: pointer; border-radius: 12px;
    transition: all 0.2s; position: relative; overflow: hidden; flex-shrink: 0;
}
.action-btn:hover { color: var(--neon-cyan); background: rgba(0, 243, 255, 0.1); }
.action-btn i { font-size: 1.1rem; }

/* Switcher: Send vs Commands */
.btn-slot { position: relative; width: 40px; height: 40px; perspective: 1000px; display: flex; align-items: center; justify-content: center; }
#send-button, #commandsButton { 
    position: absolute; inset: 0; border-radius: 12px; width: 100%; height: 100%;
    transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    display: flex; align-items: center; justify-content: center;
    backface-visibility: hidden;
}

#send-button {
    background: linear-gradient(135deg, var(--neon-cyan), var(--neon-blue)); color: #000;
    box-shadow: var(--glow-cyan); opacity: 0; transform: rotateX(180deg); pointer-events: none; z-index: 2;
}
#commandsButton {
    background: rgba(255,255,255,0.05); color: var(--neon-purple); border: var(--border-neon);
    transform: rotateX(0deg); opacity: 1; pointer-events: auto; z-index: 1;
}
#commandsButton:hover { background: var(--neon-purple); color: white; box-shadow: var(--glow-purple); }

/* Typing State (Applied via JS) */
.input-wrapper.typing #send-button { transform: rotateX(0deg); opacity: 1; pointer-events: auto; }
.input-wrapper.typing #commandsButton { transform: rotateX(-180deg); opacity: 0; pointer-events: none; }


/* --- MENUS --- */
.menu-grid, .commands-grid {
    position: absolute; bottom: calc(100% + 15px); left: 0; right: 0; margin: 0 12px;
    background: var(--glass-dark); 
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    display: none; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 16px;
    border-radius: 20px; border: var(--border-neon); 
    box-shadow: 0 -10px 40px rgba(0,0,0,0.5), inset 0 0 20px rgba(0,243,255,0.05);
    animation: menuPopup 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
    transform-origin: bottom center; z-index: 40;
}
@keyframes menuPopup { from { opacity: 0; transform: translateY(10px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
.menu-grid.open, .commands-grid.open { display: grid; }

.grid-item, .partner-btn-item { 
    padding: 12px 6px; text-align: center; font-size: 0.75rem; font-weight: 700; color: var(--text-primary);
    background: rgba(255,255,255,0.03); border-radius: 14px; border: 1px solid rgba(255,255,255,0.05);
    cursor: pointer; transition: all 0.3s; text-transform: uppercase;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px;
}
.grid-item i, .partner-btn-item i { font-size: 1.4rem; color: var(--neon-blue); transition: 0.3s; }
.grid-item:hover, .partner-btn-item:hover { 
    background: var(--neon-blue); color: #0a0a0f; 
    box-shadow: var(--glow-cyan); border-color: transparent; transform: translateY(-3px);
}
.grid-item:hover i, .partner-btn-item:hover i { color: #0a0a0f; }

/* Partner Specific Colors */
.google-partners:hover { background: #4285F4 !important; box-shadow: 0 0 15px #4285F4 !important; }
.facebook-partners:hover { background: #1877F2 !important; box-shadow: 0 0 15px #1877F2 !important; }
.youtube-partners:hover { background: #FF0000 !important; box-shadow: 0 0 15px #FF0000 !important; }
.gemini-partners:hover { background: var(--neon-purple) !important; box-shadow: var(--glow-purple) !important; }

/* --- POPUP & TOAST --- */
.popup-overlay-partners {
    position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px);
    z-index: 2000; display: none; align-items: flex-end; opacity: 0; transition: opacity 0.3s;
}
.popup-overlay-partners.show { opacity: 1; }

.popup-container-partners {
    width: 100%; height: 90dvh; background: var(--bg-secondary); border-radius: 24px 24px 0 0;
    transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
    display: flex; flex-direction: column; overflow: hidden; border-top: var(--border-neon);
    box-shadow: 0 -10px 50px rgba(0,243,255,0.1);
}
.popup-container-partners.active { transform: translateY(0); }
.popup-header-partners { 
    padding: 14px 20px; background: var(--glass-dark);
    display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid rgba(255,255,255,0.05);
}
.popup-title-partners { font-family: 'Rajdhani'; font-weight:700; color: var(--neon-cyan); letter-spacing: 1px; font-size: 1.1rem; }
.popup-close-partners {
    background: rgba(255,255,255,0.1); border: none; color: white; width: 32px; height: 32px; 
    border-radius: 50%; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center;
}
.popup-close-partners:hover { background: var(--neon-purple); box-shadow: var(--glow-purple); }

.toast { 
    position: fixed; top: 80px; left: 50%; transform: translateX(-50%) translateY(-20px); 
    background: rgba(10, 10, 15, 0.95); border: var(--border-neon); box-shadow: var(--glow-cyan);
    color: var(--neon-cyan); padding: 10px 24px; border-radius: 30px; font-family: 'Rajdhani'; font-weight: 600;
    opacity: 0; pointer-events: none; transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55); z-index: 3000; 
    white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>

<body>
  <div id='assistant-container'>
    <header class='header'>
        <div class='header-title'><h1>NEON AI | ASSISTANT</h1></div>
        <div class='header-controls'>
            <button class='theme-toggle icon-btn'><i class='fas fa-adjust'></i></button> 
            <button class='clear-chat-btn icon-btn'><i class='fas fa-trash-can'></i></button>
        </div>
    </header>

    <div class='chat-container' id='chat-messages'>
        <div class="message bot-message">
            <div class="avatar"><i class="fas fa-robot"></i></div>
            <div class="message-bubble">ระบบพร้อมใช้งานครับ...</div>
        </div>
    </div>

    <div class='input-section'>
        <div style="position: relative;">
            <div class='typing-indicator' id='typing-indicator'>
                <div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>
            </div>

            <div class='menu-grid' id='menuGrid'>
                <button class='grid-item' id='homeButton'><i class='fas fa-house-signal'></i>HOME</button>
                <button class='grid-item' id='clearAllButton'><i class='fas fa-biohazard'></i>PURGE</button>
            </div>
            
            <div class='commands-grid' id='commandsGrid'>
                <button class='partner-btn-item google-partners' data-url="space.html" data-name="Google Doc"><i class="fab fa-google"></i>DOCS</button>
                <button class='partner-btn-item facebook-partners' data-url="space2.html" data-name="Support Team"><i class="fab fa-facebook-f"></i>SUPPORT</button>
                <button class='partner-btn-item youtube-partners' data-url="https://chiangmai-saraphi.lovable.app/" data-name="Finance"><i class="fab fa-youtube"></i>FINANCE</button>
                <button class='partner-btn-item gemini-partners' data-url="space3.html" data-name="Gemini Pro"><i class="fas fa-brain"></i>GEMINI</button>
            </div>

            <div class='input-wrapper' id='inputWrapper'>
                <button class='action-btn' id='menuButton'><i class='fas fa-bars-staggered'></i></button>
                
                <input type='text' class='message-input' id='user-input' placeholder='Enter command...' autocomplete="off"/>
                
                <input type='file' id='fileInput' accept='image/*' style='display: none;'/>
                <button class='action-btn' id='attachButton'><i class='fas fa-images'></i></button>
                <button class='action-btn' id='micButton'><i class='fas fa-microphone-lines'></i></button>
                
                <div class="btn-slot">
                    <button class='action-btn' id='commandsButton'><i class='fas fa-bolt-lightning'></i></button>
                    <button class='action-btn' id='send-button'><i class='fas fa-paper-plane'></i></button>
                </div>
            </div>
        </div>
    </div>

    <div class="popup-overlay-partners" id="popupOverlay">
        <div class="popup-container-partners" id="popupContainer">
            <div class="popup-header-partners">
                <span class="popup-title-partners" id="popupTitle">BROWSER LINK</span>
                <button class="popup-close-partners" id="popupClose"><i class="fas fa-xmark"></i></button>
            </div>
            <iframe id="popupContent" style="flex:1; border:none; background: #fff;" src="about:blank"></iframe>
        </div>
    </div>
    
    <div class='toast' id='toast'><i class="fas fa-circle-info"></i> System Ready</div>
  </div>

<script>
    const getEl = (id) => document.getElementById(id);
    const userInput = getEl('user-input');
    const inputWrapper = getEl('inputWrapper');
    const chatContainer = getEl('chat-messages');
    const toast = getEl('toast');

    function showToast(m) { 
        toast.innerHTML = `<i class="fas fa-satellite-dish"></i> ${m}`; 
        toast.classList.add('show'); 
        setTimeout(()=>toast.classList.remove('show'), 2500); 
    }

    // 1. Toggle Send/Command Button based on input
    userInput.addEventListener('input', () => {
        if (userInput.value.trim().length > 0) {
            inputWrapper.classList.add('typing');
        } else {
            inputWrapper.classList.remove('typing');
        }
    });

    // 2. Menu Toggles
    getEl('menuButton').addEventListener('click', (e) => {
        e.stopPropagation();
        getEl('menuGrid').classList.toggle('open');
        getEl('commandsGrid').classList.remove('open');
    });

    getEl('commandsButton').addEventListener('click', (e) => {
        e.stopPropagation();
        getEl('commandsGrid').classList.toggle('open');
        getEl('menuGrid').classList.remove('open');
    });

    document.addEventListener('click', (e) => {
        if (!e.target.closest('.input-wrapper') && !e.target.closest('.menu-grid') && !e.target.closest('.commands-grid')) {
            getEl('menuGrid').classList.remove('open');
            getEl('commandsGrid').classList.remove('open');
        }
    });

    // 3. Partner Popup Logic
    const popupOverlay = getEl('popupOverlay');
    const popupContainer = getEl('popupContainer');
    
    document.querySelectorAll('.partner-btn-item').forEach(btn => {
        btn.addEventListener('click', () => {
            getEl('commandsGrid').classList.remove('open');
            getEl('popupTitle').textContent = btn.dataset.name;
            getEl('popupContent').src = btn.dataset.url;
            
            popupOverlay.style.display = 'flex';
            setTimeout(() => popupOverlay.classList.add('show'), 10);
            setTimeout(() => popupContainer.classList.add('active'), 50);
        });
    });

    const closePopup = () => {
        popupContainer.classList.remove('active');
        popupOverlay.classList.remove('show');
        setTimeout(() => { 
            popupOverlay.style.display = 'none'; 
            getEl('popupContent').src = 'about:blank'; 
        }, 400);
    };
    getEl('popupClose').addEventListener('click', closePopup);
    popupOverlay.addEventListener('click', (e) => { if(e.target === popupOverlay) closePopup(); });

    // 4. Clear Chat Visuals
    document.querySelector('.clear-chat-btn').addEventListener('click', () => {
        if(confirm('Purge all data?')) {
            chatContainer.innerHTML = '';
            showToast("System Purged.");
        }
    });

    // 5. Client-Side Features (OCR/Speech)
    getEl('attachButton').addEventListener('click', () => getEl('fileInput').click());
    getEl('fileInput').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if(!file) return;
        showToast("Scanning Image...");
        
        const reader = new FileReader();
        reader.onload = (ev) => {
            const div = document.createElement('div');
            div.className = 'message user-message';
            div.innerHTML = `<div class="message-bubble"><img src="${ev.target.result}" style="max-width:200px; border-radius:10px;"></div>`;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
        reader.readAsDataURL(file);

        try {
            const worker = await Tesseract.createWorker('tha+eng');
            const { data: { text } } = await worker.recognize(file);
            await worker.terminate();
            if(text.trim()) { 
                userInput.value = text.trim(); 
                userInput.dispatchEvent(new Event('input')); 
                showToast("Text Extracted"); 
            }
        } catch(err) { console.error(err); }
    });

    if ('webkitSpeechRecognition' in window) {
        const rec = new webkitSpeechRecognition();
        rec.lang = 'th-TH';
        const micBtn = getEl('micButton');
        micBtn.addEventListener('click', () => { 
            rec.start(); 
            micBtn.style.color = 'var(--neon-cyan)';
            showToast("Listening..."); 
        });
        rec.onresult = (e) => { 
            userInput.value += e.results[0][0].transcript; 
            userInput.dispatchEvent(new Event('input')); 
            micBtn.style.color = '';
        };
    } else {
        getEl('micButton').style.display = 'none';
    }
</script>

<script src="chat.js"></script>

</body>
</html>
